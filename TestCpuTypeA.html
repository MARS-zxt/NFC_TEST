<script type="text/javascript">
    var handle;
    var messageText = document.getElementById("messageText");
    CommandTypeACPU = async function () {
        sdata = document.getElementById("command").value;
        var result = await sendCommand(sdata, handle);
        messageText.value = messageText.value + result.msg;
        return;
    }
    InitTypeACPU = async function () {
        var result = await init();
        messageText.value = messageText.value + result.msg;
        if (result.code == 0) {
            handle = result.data.handle;
        }
        return;
    }
    ExternalAuthenticate = async function () {
		var result = await externalAuthenticate("00",document.getElementById("key").value);
		messageText.value = messageText.value + result.msg;
		return result;
	}
	
    TripleDesExternalAuthenticate = async function () {
		var result = await tripleDesExternalAuthenticate("00",document.getElementById("key").value);
		messageText.value = messageText.value + result.msg;
		return result;
	}
    ExitTypeACPU = async function () {
        result = await dc_exit(handle);
        messageText.value = messageText.value + "<<关闭设备成功" + "\r\n";
        return;
    }

        checkKeyLen = function(el, hintId) {
            var hint = document.getElementById(hintId);
            if(el.value.length !== 32) {
                el.classList.add("input-error");
                if(hint) hint.classList.add("show");
            } else {
                el.classList.remove("input-error");
                if(hint) hint.classList.remove("show");
            }
        }
ClearLog = async function (command) {
        messageText.value = "";
    }

    // ===== 测试数据写入辅助函数 =====
    function decToHex4(val) {
        var n = parseInt(val) || 0;
        return ("0000000" + n.toString(16)).slice(-8);
    }
    function decToHex2(val) {
        var n = parseInt(val) || 0;
        return ("000" + n.toString(16)).slice(-4);
    }
    function decToHex1(val) {
        var n = parseInt(val) || 0;
        return ("0" + n.toString(16)).slice(-2);
    }

    // ===== 写入文件0008 燃气表状态 =====
    writeTestData0008 = async function() {
        if (!handle) { alert("请先初始化连接"); return; }
        var keyVal = document.getElementById("key").value;

        // 1. 选择MF主目录
        messageText.value += ">>1.选择MF主目录(3F00)\r\n";
        var r = await sendCommand(cmd_SelectFileByID("3F00"), handle);
        r.code = r.data.substr(r.data.length - 4, 4);
        messageText.value += r.msg;
        if (r.code != "9000") { alert("选择MF失败:" + r.code); return; }

        // 2. 外部认证
        messageText.value += ">>2.外部认证\r\n";
        r = await tripleDesExternalAuthenticate("00", keyVal);
        messageText.value += r.msg;
        r.code = r.data ? r.data.substr(r.data.length - 4, 4) : r.code;
        if (r.code != "9000") { alert("外部认证失败:" + r.code); return; }

        // 3. 选择ADF01
        messageText.value += ">>3.选择ADF01(1001)\r\n";
        r = await sendCommand(cmd_SelectFileByID("1001"), handle);
        r.code = r.data.substr(r.data.length - 4, 4);
        messageText.value += r.msg;
        if (r.code != "9000") { alert("选择ADF01失败:" + r.code); return; }

        // 4. 打包数据并写入
        messageText.value += ">>4.写入0008燃气表状态\r\n";
        var readDate = dateFormatHex("YYYYMMDDWWHHmmss", new Date()) + "00000000";
        var data = readDate
            + decToHex4(document.getElementById("f08_meterStatus").value)
            + decToHex4(document.getElementById("f08_maskStatus").value)
            + decToHex4(document.getElementById("f08_totalGas").value)
            + decToHex4(document.getElementById("f08_creditLimit").value)
            + decToHex4(document.getElementById("f08_balance").value)
            + decToHex2(document.getElementById("f08_mainVoltage").value);
        var updateCmd = cmd_UpdateBinary("00", data);
        var result = await WriteFileData("0008", updateCmd, keyVal);
        messageText.value += result.msg;
    };

    // ===== 写入文件0009 冻结日志 =====
    writeTestData0009 = async function() {
        if (!handle) { alert("请先初始化连接"); return; }
        var keyVal = document.getElementById("key").value;

        // 1. 选择MF主目录
        messageText.value += ">>1.选择MF主目录(3F00)\r\n";
        var r = await sendCommand(cmd_SelectFileByID("3F00"), handle);
        r.code = r.data.substr(r.data.length - 4, 4);
        messageText.value += r.msg;
        if (r.code != "9000") { alert("选择MF失败:" + r.code); return; }

        // 2. 外部认证
        messageText.value += ">>2.外部认证\r\n";
        r = await tripleDesExternalAuthenticate("00", keyVal);
        messageText.value += r.msg;
        r.code = r.data ? r.data.substr(r.data.length - 4, 4) : r.code;
        if (r.code != "9000") { alert("外部认证失败:" + r.code); return; }

        // 3. 选择ADF01
        messageText.value += ">>3.选择ADF01(1001)\r\n";
        r = await sendCommand(cmd_SelectFileByID("1001"), handle);
        r.code = r.data.substr(r.data.length - 4, 4);
        messageText.value += r.msg;
        if (r.code != "9000") { alert("选择ADF01失败:" + r.code); return; }

        // 4. 打包数据并写入
        messageText.value += ">>4.写入0009冻结日志\r\n";
        // 日冻结头 4B: year+month+day+count
        var dayHeader = decToHex1(document.getElementById("f09_dayY").value)
            + decToHex1(document.getElementById("f09_dayM").value)
            + decToHex1(document.getElementById("f09_dayD").value)
            + decToHex1(document.getElementById("f09_dayCount").value);
        // 7条日冻结量 各4B
        var dayData = "";
        for (var i = 1; i <= 7; i++) {
            dayData += decToHex4(document.getElementById("f09_day" + i).value);
        }
        // 月冻结头 3B + 1B padding
        var monHeader = decToHex1(document.getElementById("f09_monY").value)
            + decToHex1(document.getElementById("f09_monM").value)
            + decToHex1(document.getElementById("f09_monCount").value);
        // 6条月冻结量 各4B
        var monData = "";
        for (var i = 1; i <= 6; i++) {
            monData += decToHex4(document.getElementById("f09_mon" + i).value);
        }
        // 关阀事件
        var evtCount = parseInt(document.getElementById("f09_evtCount").value) || 0;
        var evtData = decToHex1(String(evtCount));
        for (var i = 1; i <= 3; i++) {
            if (i <= evtCount) {
                evtData += (document.getElementById("f09_evt" + i + "Type").value + "0000").slice(0, 4);
                evtData += (document.getElementById("f09_evt" + i + "Time").value + "000000000000").slice(0, 12);
                evtData += (document.getElementById("f09_evt" + i + "Detail").value + "00").slice(0, 2);
            } else {
                evtData += "000000000000000000"; // 18 hex chars = 9 zero bytes
            }
        }
        var data = dayHeader + dayData + monHeader + monData + evtData;
        var updateCmd = cmd_UpdateBinary("00", data);
        var result = await WriteFileData("0009", updateCmd, keyVal);
        messageText.value += result.msg;
    };


window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'setBackground') {
        document.body.style.backgroundImage = e.data.backgroundImage;
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundAttachment = 'fixed';
    }
});

</script>
