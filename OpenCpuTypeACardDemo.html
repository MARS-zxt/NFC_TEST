	ReadTypeACPUCard = async function () {
		i1 = 0;
		messageText.value = messageText.value + i1 + ".初始化连接" + "\r\n";
		r = await InitTypeACPU();
		if (r.code != 0) {
			alert("初始化连接失败");
			return;
		}else{
			handle = r.data.handle;
			document.getElementById("cardID").value = r.data.cardID;
			await InitTripleDesExternalAuthenticate()
			await ClearTypeACPUCard()
			await OpenTypeACPUCard()
		}
	}
	OutClearTypeACPUCard = async function () {
		var r;
		var sw;
		if (typeof (handle) == "undefined") {
			alert("先进行读卡进行初始化连接");
			return;
		}
		i1 = 1;
		messageText.value = messageText.value + i1 + ".选择MF主目录" + "\r\n";
		sdata = cmd_SelectFileByID("3F00");
		r = await CommandTypeACPU(sdata);
		if(r.code!="9000"){
			alert("选择MF主目录失败:"+r.code);
			return;
		}
		
		i1 = i1 + 1;
		messageText.value = messageText.value + i1 + ".3DES外部认证" + "\r\n";
		r = await TripleDesExternalAuthenticate();

		i1 = i1 + 1;
		messageText.value = messageText.value + i1 + ".卡片擦除" + "\r\n";
		r = await CommandTypeACPU(cmd_EraseDF());
		if(r.code!="9000"){
			alert("卡片擦除失败:"+r.code);
			return;
		}
	}

	CreateMFKeyFile = async function () {
		i3 = 1;
		//2.创建MF的密钥文件
		messageText.value = messageText.value + i1 + "-" + i2 + "-" + i3 + ".创建MF的密钥文件" + "\r\n";
		sdata = cmd_CreateKeyFile("0000", "0030", "01");
		result = await CommandTypeACPU(sdata);
		if (result.code != "9000") {
			return result;
		}
		i3 = i3 + 1;
		//3.装载MF的36文件线路保护密钥即应用维护密钥
		messageText.value = messageText.value + i1 + "-" + i2 + "-" + i3 + ".装载MF的36文件线路保护密钥即应用维护密钥" + "\r\n";
		sdata = cmd_Write36Key("00", key.value);
		result = await CommandTypeACPU(sdata);
		if (result.code != "9000") {
			return result;
		}
		i3 = i3 + 1;
		//4.装载MF的39外部认证密钥即应用主控密钥
		messageText.value = messageText.value + i1 + "-" + i2 + "-" + i3 + ".装载MF的39外部认证密钥即应用主控密钥" + "\r\n";
		sdata = cmd_Write39Key("00", key.value);
		result = await CommandTypeACPU(sdata);
		return result;
	}

		fileId = "001C";
		messageText.value = messageText.value + i1 + "-" + i2 + "-" + i3 + ".创建上次充值TOKEN文件(二进制文件)" + "\r\n";
		sdata = cmd_CreateBinaryFile(fileId, "0040");
		result = await CommandTypeACPU(sdata);
		if (result.code != "9000") {
			return result;
		}
		i3 = i3 + 1;
		//2.写入上次充值TOKEN
		messageText.value = messageText.value + i1 + "-" + i2 + "-" + i3 + ".写入上次充值TOKEN" + "\r\n";
		sdata=cmd_UpdateBinary("00",'00' + bytesToHex(decimal20ToBCD10("00000000000000000000")) + "00" + bytesToHex(decimal20ToBCD10("00000000000000000000")) + "00" + bytesToHex(decimal20ToBCD10("00000000000000000000")) + "00");
		var result = await WriteFile(fileId, sdata);
		return result;
	}

	ExternalAuthenticate = async function () {
		var result = await externalAuthenticate("00", key.value);
		var sw=result.data.substr(result.data.length-4,4);
		if(sw=="")sw=result.code;
		result.code=sw;
		messageText.value = messageText.value + result.msg;
		if(sw!="9000"){
			alert("外部认证失败:"+sw);
		//	return;
		}
		return result;
	}

	WriteFile = async function(fileId,fileData){
		var result = await WriteFileData(fileId,fileData,key.value);
		var sw=result.data.substr(result.data.length-4,4);
		if(sw=="")sw=result.code;
		result.code=sw;
		messageText.value = messageText.value + result.msg;
		return result;
	}
	
	CommandTypeACPU = async function (command) {
		var result = await sendCommand(command, handle);
		var sw=result.data.substr(result.data.length-4,4);
		if(sw=="")sw=result.code;
		result.code=sw;
		messageText.value = messageText.value + result.msg;
		return result;
	}

	InitTypeACPU = async function () {
		var result = await init();
		messageText.value = messageText.value + result.msg;
		return result;
	}


	ExitTypeACPU = async function () {
		result = await dc_exit(handle);
		messageText.value = messageText.value + "<<关闭设备成功" + "\r\n";
		return;
	}

	ClearLog = async function (command) {
		messageText.value = "";
	}

</script>
