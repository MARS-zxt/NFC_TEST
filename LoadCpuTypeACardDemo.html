            position: absolute;

            left: 50%;

            width: 80px;

            height: 3px;

            background: linear-gradient(90deg, #007bff, #00c6ff);

            border-radius: 2px;

 /* 表格样式优化 */

        .gas-table {

            width: 100%;

        }



        .data-group tr:last-of-type td {

            border-bottom: 1px solid rgba(148, 163, 184, 0.35);

        }



        .data-group tr td:first-child {

        .data-group tr td:last-child {

<script type="text/javascript">

    var handle;

    var i1 = 0, i2 = 0;

    var messageText = document.getElementById("messageText");

    ReadTypeACPUCard = async function () {

        var r;

        i1 = 1;

        messageText.value = messageText.value + i1 + ".初始化连接" + "\r\n";

        r = await InitTypeACPU();

        if (r.code != 0) {

            alert("初始化连接失败");

            return;

        }else{

            handle = r.data.handle;

            document.getElementById("cardID").value = r.data.cardID;

        }

        i1 = i1 + 1;

        messageText.value = messageText.value + i1 + ".读取MF主目录文件" + "\r\n";

        await readMFFile();

        i1 = i1 + 1;

        messageText.value = messageText.value + i1 + ".读取应用ADF01目录文件" + "\r\n";

        await readADF01File();

    }

    writeTypeACPUCard = async function () {

        var r;

        i1 = 1;

        messageText.value = messageText.value + i1 + ".初始化连接" + "\r\n";

        r = await InitTypeACPU();

        if (r.code != 0) {

            alert("初始化连接失败");

            return;

        }else{

            handle = r.data.handle;

            document.getElementById("cardID").value = r.data.cardID;

        }

        i1 = i1 + 1;

        messageText.value = messageText.value + i1 + ".写token" + "\r\n";

        await writeTokenFile();

        

    }

    writeTokenFile = async function () {

        fileId = "001C";

        i2 = 1;

        messageText.value = messageText.value + i1 +"-"+ i2 + ".选择MF主目录文件" + "\r\n";

        sdata = cmd_SelectFileByID("3F00");

        r = await CommandTypeACPU(sdata);

        if(r.code!="9000"){

            alert("选择MF主目录文件失败:"+r.code);

            return;

        }

        i2 = i2 + 1;

        messageText.value = messageText.value + i1 +"-"+ i2 + ".外部认证" + "\r\n";

        r = await TripleDesExternalAuthenticate("00");

        if(r.code!="9000" && r.data!="9000"){

            alert("外部认证失败:"+r.code);

        //	return;

        }

        i2 = i2 + 1;

        messageText.value = messageText.value + i1 +"-"+ i2 + ".选择卡应用ADF01目录文件" + "\r\n";

        sdata = cmd_SelectFileByID("1001");

        r = await CommandTypeACPU(sdata);

        if(r.code!="9000"){

            alert("选择卡应用ADF目录文件失败:"+r.code);

            return;

        }

        i2 = i2 + 1;

        messageText.value = messageText.value + i1 + "-" + i2 + ".写充值TOKEN" + "\r\n";

        var token1 = document.getElementById("tokenID1").value

        var result1 = '99'

        var token2 = document.getElementById("tokenID2").value

        var result2 = '99'

        var token3 = document.getElementById("tokenID3").value

        var result3 = '99'

        var token4 = document.getElementById("tokenID4").value

        var result4 = '99'

        var token5 = document.getElementById("tokenID5").value

        var result5 = '99'

        var tokenNum = document.getElementById("tokenNum").value

        if(token1.length !== 20){

            alert("要写入20位token:"+r.code);

            return;

        }

        if(token1.length !== 20){

            alert("要写入20位token:"+r.code);

            return;

        }

        if(token3.length !== 20){

            alert("要写入20位token:"+r.code);

            return;

        }

        if(token4.length !== 20){

            alert("要写入20位token:"+r.code);

            return;

        }

        if(token5.length !== 20){

            alert("要写入20位token:"+r.code);

            return;

        }

        var token = tokenNum.toString(16).padStart(2, '0') + bytesToHex(decimal20ToBCD10(token1))  + bytesToHex(decimal20ToBCD10(token2)) + bytesToHex(decimal20ToBCD10(token3)) + bytesToHex(decimal20ToBCD10(token4)) + bytesToHex(decimal20ToBCD10(token5)) + int8StrToHex(result1) + int8StrToHex(result2) + int8StrToHex(result3) + int8StrToHex(result4) + int8StrToHex(result5)

        sdata=cmd_UpdateBinary("00", token);

        var result = await WriteFile(fileId, sdata);

    }



        getCardTypeText = function (val) {

            if (val === "01" || val === "1") return "用户卡";

            if (val === "02" || val === "2") return "维护卡";

            return "未知卡";

        }



        parsePaddedFrame = function (hexStr) {

            var len = parseInt(hexStr.slice(0, 2), 16);

            var dataHex = hexStr.slice(2, 2 + len * 2);

            return ascii2str(dataHex);

        }

        formatReadDate = function (hexStr) {
            var year = parseInt(hexStr.slice(0, 4), 16);
            var month = parseInt(hexStr.slice(4, 6), 16);
            var day = parseInt(hexStr.slice(6, 8), 16);
            var weekday = parseInt(hexStr.slice(8, 10), 16);
            var hour = parseInt(hexStr.slice(10, 12), 16);
            var minute = parseInt(hexStr.slice(12, 14), 16);
            var second = parseInt(hexStr.slice(14, 16), 16);
            return year + "年" + month + "月" + day + "日 星期" + weekday + " " +
                hour.toString().padStart(2, "0") + ":" +
                minute.toString().padStart(2, "0") + ":" +
                second.toString().padStart(2, "0");
        }

    WriteFile = async function(fileId,fileData){
