<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC 燃气表 CPU 卡测试工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
            background-image: url('image/vector-art-colorful-8140x8140-12144.jpg');
            background-size: cover;
            background-attachment: fixed;
        }

        /* ===== 主布局 ===== */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 220px;
            min-width: 220px;
            background: rgba(15, 23, 42, 0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            transition: width 0.25s ease, min-width 0.25s ease;
            overflow: hidden;
            z-index: 10;
            box-shadow: 2px 0 20px rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sidebar.collapsed {
            width: 52px;
            min-width: 52px;
        }

        /* 顶栏：Logo + 折叠按钮 */
        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            min-height: 56px;
        }

        .sidebar-logo {
            font-size: 15px;
            font-weight: 700;
            color: #f1f5f9;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .sidebar-logo .logo-icon {
            display: inline-block;
            width: 24px;
            text-align: center;
            margin-right: 6px;
        }

        .sidebar.collapsed .sidebar-logo { display: none; }

        .btn-toggle {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            line-height: 1;
            transition: color 0.15s, background 0.15s;
            flex-shrink: 0;
        }

        .btn-toggle:hover {
            color: #f1f5f9;
            background: rgba(255, 255, 255, 0.08);
        }

        /* 菜单区 */
        .sidebar-nav {
            flex: 1;
            padding: 12px 0;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .nav-section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #64748b;
            padding: 8px 16px 4px;
            white-space: nowrap;
        }

        .sidebar.collapsed .nav-section-title { display: none; }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 11px 16px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            border-left: 3px solid transparent;
            transition: all 0.15s ease;
            user-select: none;
        }

        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
        }

        .nav-item.active {
            background: rgba(0, 123, 255, 0.12);
            color: #60a5fa;
            border-left-color: #3b82f6;
            font-weight: 600;
        }

        .nav-item .nav-icon {
            width: 20px;
            height: 20px;
            margin-right: 10px;
            flex-shrink: 0;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .sidebar.collapsed .nav-item {
            padding: 12px 0;
            justify-content: center;
            border-left: none;
            border-right: 3px solid transparent;
        }

        .sidebar.collapsed .nav-item.active {
            border-left: none;
            border-right-color: #3b82f6;
        }

        .sidebar.collapsed .nav-item .nav-icon {
            margin-right: 0;
            width: 22px;
            height: 22px;
        }

        .sidebar.collapsed .nav-label { display: none; }

        /* 底部 */
        .sidebar-footer {
            padding: 12px 14px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 11px;
            color: #475569;
            white-space: nowrap;
        }

        .sidebar.collapsed .sidebar-footer { display: none; }

        /* ===== 内容区 ===== */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            position: relative;
        }

        /* 顶条 */
        .content-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 44px;
            background: rgba(255, 255, 255, 0.62);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.4);
            flex-shrink: 0;
        }

        .content-title {
            font-size: 15px;
            font-weight: 600;
            color: #334155;
        }

        .content-hint {
            font-size: 12px;
            color: #94a3b8;
        }

        /* iframe */
        .iframe-wrapper {
            flex: 1;
            position: relative;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            margin: 12px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .iframe-wrapper iframe.active {
            display: block;
        }

        /* iframe 加载中遮罩 */
        .iframe-loading {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(248, 250, 252, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 5;
        }

        .iframe-loading.show { opacity: 1; }

        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ===== 响应式 ===== */
        /* ===== 设置面板 ===== */
        .settings-panel {
            flex: 1;
            overflow-y: auto;
            padding: 32px 40px;
        }

        .settings-container {
            max-width: 680px;
        }

        .settings-title {
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 28px;
        }

        .settings-section {
            margin-bottom: 28px;
        }

        .settings-section-title {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .preset-grid {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }

        .preset-card {
            width: 160px;
            cursor: pointer;
            border-radius: 14px;
            overflow: hidden;
            border: 2px solid transparent;
            transition: all 0.2s;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .preset-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .preset-card.active {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        .preset-preview {
            width: 100%;
            height: 100px;
            background-size: cover;
            background-position: center;
        }

        .preset-card span {
            display: block;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            color: #334155;
            padding: 10px 8px;
        }

        .upload-btn {
            display: inline-block;
            padding: 9px 18px;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(148,163,184,0.25);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            cursor: pointer;
            transition: all 0.15s;
        }

        .upload-btn:hover {
            background: rgba(255,255,255,0.8);
            border-color: #3b82f6;
        }

        .reset-btn {
            display: inline-block;
            margin-left: 10px;
            padding: 9px 18px;
            background: none;
            border: 1px solid rgba(148,163,184,0.25);
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            transition: all 0.15s;
        }

        .reset-btn:hover {
            color: #ef4444;
            border-color: #ef4444;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 52px;
                min-width: 52px;
            }
            .sidebar .sidebar-logo,
            .sidebar .nav-label,
            .sidebar .nav-section-title,
            .sidebar .sidebar-footer { display: none; }
            .sidebar .nav-item {
                padding: 12px 0;
                justify-content: center;
                border-left: none;
            }
            .sidebar .nav-item .nav-icon { margin-right: 0; font-size: 20px; }
            .sidebar .nav-item.active { border-left: none; border-right: 3px solid #3b82f6; }
        }
    </style>
</head>

<body>
    <div class="app-container">

        <!-- ===== 侧边栏 ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-logo">
                    <span class="logo-icon">📡</span>NFC 测试工具
                </span>
                <button class="btn-toggle" id="btnToggle" title="折叠/展开侧边栏">☰</button>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-title">功能页面</div>
                <div class="nav-item active" data-page="OpenCpuTypeACardDemo.html" data-title="开卡界面">
                    <svg class="nav-icon" viewBox="0 0 20 20">
                        <rect x="2" y="4" width="16" height="12" rx="2"/>
                        <rect x="6" y="7.5" width="5" height="5" rx="0.8"/>
                        <line x1="7.5" y1="8.8" x2="9.5" y2="8.8"/>
                        <line x1="7.5" y1="10.2" x2="9.5" y2="10.2"/>
                        <line x1="7.5" y1="11.6" x2="9.5" y2="11.6"/>
                    </svg>
                    <span class="nav-label">开卡</span>
                </div>
                <div class="nav-item" data-page="LoadCpuTypeACardDemo.html" data-title="燃气卡读写界面">
                    <svg class="nav-icon" viewBox="0 0 20 20">
                        <rect x="2" y="3" width="11" height="14" rx="1.5"/>
                        <path d="M14.5 7.5a2.8 2.8 0 0 1 0 5"/>
                        <path d="M17 5.5a6 6 0 0 1 0 9"/>
                    </svg>
                    <span class="nav-label">读写卡</span>
                </div>
                <div class="nav-item" data-page="TestCpuTypeA.html" data-title="APDU 测试界面">
                    <svg class="nav-icon" viewBox="0 0 20 20">
                        <rect x="2" y="3" width="16" height="14" rx="2"/>
                        <line x1="2" y1="7" x2="18" y2="7"/>
                        <polyline points="5.5,10.5 8,13 5.5,15.5"/>
                        <line x1="9.5" y1="14.5" x2="15" y2="14.5"/>
                    </svg>
                    <span class="nav-label">APDU 测试</span>
                </div>
                <div class="nav-section-title">其他</div>
                <div class="nav-item" data-page="__settings__" data-title="设置">
                    <svg class="nav-icon" viewBox="0 0 20 20">
                        <circle cx="10" cy="10" r="3.2"/>
                        <path d="M10 3v2M10 15v2M3 10h2M15 10h2M5.05 5.05l1.42 1.42M13.53 13.53l1.42 1.42M14.95 5.05l-1.42 1.42M6.47 13.53l-1.42 1.42"/>
                        <circle cx="10" cy="10" r="1.8"/>
                    </svg>
                    <span class="nav-label">设置</span>
                </div>
            </nav>

            <div class="sidebar-footer">NFC TypeA CPU Card Tool</div>
        </aside>

        <!-- ===== 内容区 ===== -->
        <main class="content-area">
            <div class="content-topbar">
                <span class="content-title" id="contentTitle">开卡界面</span>
                <span class="content-hint">← 侧边栏可折叠</span>
            </div>
            <div class="iframe-wrapper">
                <div class="iframe-loading show" id="loadingOverlay">
                    <div class="spinner"></div>
                </div>
                <iframe id="frameOpen" data-src="OpenCpuTypeACardDemo.html" src="OpenCpuTypeACardDemo.html" title="开卡界面"></iframe>
                <iframe id="frameLoad" data-src="LoadCpuTypeACardDemo.html" title="燃气卡读写界面"></iframe>
                <iframe id="frameTest" data-src="TestCpuTypeA.html" title="APDU 测试界面"></iframe>
            </div>

            <!-- 设置面板 -->
            <div class="settings-panel" id="settingsPanel" style="display:none">
                <div class="settings-container">
                    <h2 class="settings-title">设置</h2>

                    <div class="settings-section">
                        <h3 class="settings-section-title">背景图片</h3>
                        <div class="preset-grid" id="presetGrid">
                            <div class="preset-card active" data-bg="preset:default" title="彩色抽象">
                                <div class="preset-preview" style="background-image:url('image/vector-art-colorful-8140x8140-12144.jpg')"></div>
                                <span>彩色抽象</span>
                            </div>
                            <div class="preset-card" data-bg="preset:gradient" title="柔和渐变">
                                <div class="preset-preview" style="background:linear-gradient(135deg,#667eea,#764ba2,#f093fb,#f5576c)"></div>
                                <span>柔和渐变</span>
                            </div>
                            <div class="preset-card" data-bg="preset:dark" title="深色暗夜">
                                <div class="preset-preview" style="background:linear-gradient(180deg,#0f172a,#1e293b,#334155)"></div>
                                <span>深色暗夜</span>
                            </div>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3 class="settings-section-title">自定义上传</h3>
                        <label class="upload-btn">
                            📁 选择图片
                            <input type="file" id="bgFileInput" accept="image/jpeg,image/png,image/webp" hidden>
                        </label>
                        <button class="reset-btn" id="resetBgBtn">恢复默认背景</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        (function () {
            var sidebar = document.getElementById("sidebar");
            var btnToggle = document.getElementById("btnToggle");
            var contentTitle = document.getElementById("contentTitle");
            var loadingOverlay = document.getElementById("loadingOverlay");
            var navItems = document.querySelectorAll(".nav-item");

            // 页面→iframe 映射（懒加载：仅首次访问时设置 src）
            var PAGE_IFRAME_MAP = {
                "OpenCpuTypeACardDemo.html": document.getElementById("frameOpen"),
                "LoadCpuTypeACardDemo.html": document.getElementById("frameLoad"),
                "TestCpuTypeA.html": document.getElementById("frameTest")
            };

            // 获取所有 iframe 元素
            var allFrames = [
                document.getElementById("frameOpen"),
                document.getElementById("frameLoad"),
                document.getElementById("frameTest")
            ];

            var STORAGE_KEY_COLLAPSED = "nfc_tool_sidebar_collapsed";
            var STORAGE_KEY_PAGE = "nfc_tool_active_page";

            // ---- 状态恢复 ----
            var collapsed = localStorage.getItem(STORAGE_KEY_COLLAPSED) === "1";
            if (collapsed) {
                sidebar.classList.add("collapsed");
            }

            var savedPage = localStorage.getItem(STORAGE_KEY_PAGE);
            var activeFrame = null;
            if (savedPage) {
                navItems.forEach(function (item) {
                    if (item.getAttribute("data-page") === savedPage) {
                        item.classList.add("active");
                        contentTitle.textContent = item.getAttribute("data-title") || "";
                        // 激活对应 iframe
                        if (PAGE_IFRAME_MAP[savedPage]) {
                            activeFrame = PAGE_IFRAME_MAP[savedPage];
                            // 懒加载：src 未设置或为 about:blank 时才设置
                            if (!activeFrame.src || activeFrame.src === "about:blank" || activeFrame.src.indexOf(savedPage) === -1) {
                                activeFrame.src = savedPage;
                            }
                            activeFrame.classList.add("active");
                        }
                    } else {
                        item.classList.remove("active");
                    }
                });
            }

            // 默认激活开卡页面
            if (!activeFrame) {
                var defaultFrame = PAGE_IFRAME_MAP["OpenCpuTypeACardDemo.html"];
                if (defaultFrame) {
                    defaultFrame.classList.add("active");
                }
            }

            // ---- 折叠切换 ----
            btnToggle.addEventListener("click", function () {
                sidebar.classList.toggle("collapsed");
                var isCollapsed = sidebar.classList.contains("collapsed");
                localStorage.setItem(STORAGE_KEY_COLLAPSED, isCollapsed ? "1" : "0");
            });

            // ---- 菜单切换 ----
            var settingsPanel = document.getElementById("settingsPanel");
            var iframeWrapper = document.querySelector(".iframe-wrapper");

            navItems.forEach(function (item) {
                item.addEventListener("click", function () {
                    var page = item.getAttribute("data-page");

                    // 设置页面特殊处理
                    if (page === "__settings__") {
                        navItems.forEach(function (n) { n.classList.remove("active"); });
                        item.classList.add("active");
                        contentTitle.textContent = "设置";
                        iframeWrapper.style.display = "none";
                        settingsPanel.style.display = "";
                        loadingOverlay.classList.remove("show");
                        // 隐藏所有 iframe
                        allFrames.forEach(function (f) { f.classList.remove("active"); });
                        localStorage.setItem(STORAGE_KEY_PAGE, "__settings__");
                        return;
                    }

                    // 已在当前页面，不重复操作
                    if (item.classList.contains("active")) {
                        return;
                    }

                    // 恢复 iframe 显示
                    iframeWrapper.style.display = "";
                    settingsPanel.style.display = "none";

                    // 更新激活状态
                    navItems.forEach(function (n) { n.classList.remove("active"); });
                    item.classList.add("active");

                    // 切换 iframe：隐藏所有，显示目标
                    var targetFrame = PAGE_IFRAME_MAP[page];
                    if (!targetFrame) return;

                    // 懒加载：首次访问时才设置 src（src 为空、about:blank 或未包含目标页面名）
                    var isFirstLoad = !targetFrame.src || targetFrame.src === "about:blank" || targetFrame.src.indexOf(page) === -1;
                    if (isFirstLoad) {
                        loadingOverlay.classList.add("show");
                        targetFrame.src = page;
                    }

                    allFrames.forEach(function (f) { f.classList.remove("active"); });
                    targetFrame.classList.add("active");

                    contentTitle.textContent = item.getAttribute("data-title") || "";

                    // 保存到 localStorage
                    localStorage.setItem(STORAGE_KEY_PAGE, page);
                });
            });

            // ---- 设置面板逻辑 ----
            var STORAGE_KEY_BG = "nfc_tool_bg";
            var presetCards = document.querySelectorAll(".preset-card");
            var bgFileInput = document.getElementById("bgFileInput");
            var resetBgBtn = document.getElementById("resetBgBtn");

            var BG_PRESETS = {
                "preset:default": "url('image/vector-art-colorful-8140x8140-12144.jpg')",
                "preset:gradient": "linear-gradient(135deg, #667eea, #764ba2, #f093fb, #f5576c)",
                "preset:dark": "linear-gradient(180deg, #0f172a, #1e293b, #334155)"
            };

            function syncBgToIframe() {
                var bg = document.body.style.backgroundImage || BG_PRESETS["preset:default"];
                allFrames.forEach(function (frame) {
                    // 仅向已加载的 iframe 发送（src 有效且非 about:blank）
                    if (!frame.src || frame.src === "about:blank") return;
                    try {
                        frame.contentWindow.postMessage({
                            type: "setBackground",
                            backgroundImage: bg
                        }, "*");
                    } catch (e) {}
                });
            }

            function applyBackground(bgKey, bgValue) {
                document.body.style.backgroundImage = bgValue;
                document.body.style.backgroundSize = "cover";
                document.body.style.backgroundAttachment = "fixed";
                localStorage.setItem(STORAGE_KEY_BG, bgKey);

                presetCards.forEach(function (card) {
                    card.classList.toggle("active", card.getAttribute("data-bg") === bgKey);
                });

                syncBgToIframe();
            }

            // 预设点击
            presetCards.forEach(function (card) {
                card.addEventListener("click", function () {
                    var key = card.getAttribute("data-bg");
                    if (BG_PRESETS[key]) {
                        applyBackground(key, BG_PRESETS[key]);
                    }
                });
            });

            // 自定义上传
            bgFileInput.addEventListener("change", function () {
                var file = this.files[0];
                if (!file) return;
                var reader = new FileReader();
                reader.onload = function (e) {
                    var dataUrl = e.target.result;
                    var key = "custom:" + dataUrl.substring(0, 50);
                    applyBackground(key, "url('" + dataUrl + "')");
                    // Store full data URL separately due to size
                    localStorage.setItem(STORAGE_KEY_BG + "_custom", dataUrl);
                };
                reader.readAsDataURL(file);
            });

            // 恢复默认
            resetBgBtn.addEventListener("click", function () {
                localStorage.removeItem(STORAGE_KEY_BG);
                localStorage.removeItem(STORAGE_KEY_BG + "_custom");
                applyBackground("preset:default", BG_PRESETS["preset:default"]);
            });

            // 恢复保存的背景
            (function restoreBg() {
                var saved = localStorage.getItem(STORAGE_KEY_BG);
                if (saved && saved.startsWith("custom:")) {
                    var customData = localStorage.getItem(STORAGE_KEY_BG + "_custom");
                    if (customData) {
                        document.body.style.backgroundImage = "url('" + customData + "')";
                        document.body.style.backgroundSize = "cover";
                        document.body.style.backgroundAttachment = "fixed";
                    }
                } else if (saved && BG_PRESETS[saved]) {
                    applyBackground(saved, BG_PRESETS[saved]);
                }
                // Sync to iframe on initial load
                if (saved || localStorage.getItem(STORAGE_KEY_BG + "_custom")) {
                    setTimeout(syncBgToIframe, 500);
                }
            })();

            // 恢复时若上次是设置页，直接显示设置面板
            if (savedPage === "__settings__") {
                iframeWrapper.style.display = "none";
                settingsPanel.style.display = "";
                contentTitle.textContent = "设置";
            }

            // ---- iframe 加载完成 ----
            allFrames.forEach(function (frame) {
                frame.addEventListener("load", function () {
                    loadingOverlay.classList.remove("show");
                    syncBgToIframe();
                });
            });

            // ---- 小屏自动折叠 ----
            function handleResize() {
                // 只在从未手动设置过折叠状态时自动处理
                if (localStorage.getItem(STORAGE_KEY_COLLAPSED) === null) {
                    if (window.innerWidth < 900) {
                        sidebar.classList.add("collapsed");
                    }
                }
            }
            handleResize();
        })();
    </script>
</body>

</html>
